services:
  postgres:
    image: postgres:16-alpine
    container_name: jira-postgres
    environment:
      POSTGRES_DB: jira
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: jira
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: jira-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure:5

  frontend:
    build: ./frontend
    container_name: jira-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
